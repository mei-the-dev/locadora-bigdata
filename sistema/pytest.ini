[pytest]
# Testes de LOGICA PURA da fleetlib (nao exigem o stack docker).
# Rodar: cd sistema && python -m pytest tests/unit -q
testpaths = tests/unit
python_files = test_*.py
python_functions = test_*
addopts = -q --strict-markers
markers =
    integration: testes que exigem containers do docker-compose (nao rodam em CI leve)
    e2e: fluxo fim-a-fim da demo (exige stack `core` no ar)

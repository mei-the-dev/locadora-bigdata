# ============================================================================
# Mosquitto (MQTT) - broker de campo IoT da borda da frota (Camada 1).
# Configuracao minima para o cenario de demo: 1 listener anonimo na rede
# interna do compose. Em producao: TLS + autenticacao + ACL por veiculo.
# ============================================================================
listener 1883 0.0.0.0
allow_anonymous true

# Persistencia desligada (o log duravel/replay e responsabilidade do Kafka).
persistence false

# Limites defensivos (banda cara e finita - R3): mensagens pequenas (Avro).
max_packet_size 262144
message_size_limit 262144

# Logs para o stdout do container (observabilidade).
log_dest stdout
log_type error
log_type warning
log_type notice
connection_messages true
